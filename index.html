<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULK - Independent University</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        nav {
            max-width: 1000px;
            margin: 0 auto 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 0;
            animation: slideDown 0.5s ease-out;
            flex-wrap: wrap;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        nav a {
            flex: 1;
            padding: 18px 25px;
            text-decoration: none;
            color: #667eea;
            font-weight: 600;
            border-right: 1px solid #f0f0f0;
            text-align: center;
            transition: all 0.3s ease;
            font-size: 15px;
            min-width: 120px;
        }

        nav a:last-child {
            border-right: none;
        }

        nav a:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-2px);
        }

        nav a.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: bounceIn 0.6s ease-out;
            font-weight: 700;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .subtitle {
            font-size: 18px;
            font-style: italic;
            opacity: 0.95;
            animation: slideInRight 0.8s ease-out 0.2s both;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .image-container {
            text-align: center;
            padding: 40px 20px;
            background: #f8f9fa;
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        img {
            max-width: 100%;
            height: auto;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: zoomIn 0.6s ease-out 0.4s both;
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        img:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.5);
        }

        .content {
            padding: 40px 30px;
            animation: fadeIn 0.8s ease-out 0.5s both;
        }

        h2 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 20px;
            border-bottom: 3px solid #764ba2;
            padding-bottom: 10px;
        }

        h3 {
            color: #764ba2;
            font-size: 20px;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        .departments {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .department-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s ease;
            animation: slideUp 0.5s ease-out backwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .department-item:nth-child(1) { animation-delay: 0.6s; }
        .department-item:nth-child(2) { animation-delay: 0.7s; }
        .department-item:nth-child(3) { animation-delay: 0.8s; }
        .department-item:nth-child(4) { animation-delay: 0.9s; }

        .department-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="aboutme.html">About</a>
        <a href="applications.html">Apply Now</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <div class="container">
        <div class="header">
            <h1>ULK University</h1>
            <p class="subtitle">Independent University of Excellence</p>
        </div>

        <div class="image-container">
            <img src="image/ulk logo 2/ulk logo2.jpg" alt="ULK University Logo" title="ULK University Logo"/>
        </div>

        <div class="content">
            <h2>Knowledge is Everything</h2>
            <hr>

            <h3>Our Departments</h3>
            <div class="departments">
                <div class="department-item">
                    <b>Computer Science</b>
                </div>
                <div class="department-item">
                    <b>International Relations</b>
                </div>
                <div class="department-item">
                    <b>Law</b>
                </div>
                <div class="department-item">
                    <b>Economics</b>
                </div>
            </div>
        </div>
    </div>






</html>
